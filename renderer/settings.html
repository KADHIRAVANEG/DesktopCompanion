<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DesktopCompanion Settings</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #0f0f14; color: #f5f5f7; padding: 24px; }
      h1 { font-size: 18px; margin: 0 0 20px; }
      .row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #23232b; }
      .row label { font-size: 13px; }
      .row .val { font-size: 12px; color: #9a9aa8; }
      button { padding: 8px 14px; border-radius: 8px; border: 0; background: #4f46e5; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
      button.secondary { background: #2a2a35; color: #f5f5f7; }
      button:hover { background: #6366f1; }
      input[type=range] { width: 180px; }
      .footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
      .path { font-size: 11px; color: #7a7a88; word-break: break-all; max-width: 260px; text-align: right; }
    </style>
  </head>
  <body>
    <h1>DesktopCompanion Settings</h1>
    <div class="row">
      <label>Preset avatar</label>
      <select id="preset" style="background:#1a1a22;color:#f5f5f7;border:1px solid #2a2a35;border-radius:6px;padding:6px 8px;font-size:12px;min-width:160px;">
        <option value="">— Select —</option>
      </select>
    </div>
    <div class="row">
      <label>Custom VRM</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="vrm-path" class="path">Not chosen</span>
        <button id="pick-vrm">Choose…</button>
      </div>
    </div>
    <div class="row">
      <label>Scale</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="range" id="scale" min="0.4" max="2" step="0.05" />
        <span id="scale-val" class="val">1.00</span>
      </div>
    </div>
    <div class="row">
      <label>Window size</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="range" id="size" min="240" max="720" step="20" />
        <span id="size-val" class="val">420</span>
      </div>
    </div>
    <div class="row">
      <label>Always on top</label>
      <input type="checkbox" id="ontop" />
    </div>
    <div class="row">
      <label>FPS cap</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="range" id="fps" min="15" max="120" step="5" />
        <span id="fps-val" class="val">60</span>
      </div>
    </div>
    <div class="footer">
      <button class="secondary" id="quit">Quit</button>
      <button id="close">Close</button>
    </div>
    <script type="module" src="./settings.js"></script>
  </body>
</html>
